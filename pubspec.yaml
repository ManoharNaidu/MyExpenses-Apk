name: my_expenses
description: "A Personal Finance Tracker."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  flutter_dotenv: ^5.1.0
  dio: ^5.4.3
  connectivity_plus: ^6.1.1
  flutter_secure_storage: ^9.0.0
  flutter_local_notifications: ^18.0.1
  file_picker: ^8.1.2
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  fl_chart: ^0.68.0
  file_saver: ^0.2.14
  path_provider: ^2.1.2
  share_plus: ^10.1.0
  local_auth: ^2.2.0
  crypto: ^3.0.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  timezone: ^0.9.4
  go_router: ^14.6.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1
  riverpod_generator: ^2.4.3
  riverpod_lint: ^2.3.13
  custom_lint: ^0.7.3
  freezed: ^2.4.0
  json_serializable: ^6.7.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_classy.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon_classy.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - .env

