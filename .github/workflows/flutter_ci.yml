name: Flutter CI

on:
  push:
    branches: [main, develop]
    paths:
      - "my_expenses/**"
      - ".github/workflows/flutter_ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "my_expenses/**"
      - ".github/workflows/flutter_ci.yml"

env:
  FLUTTER_CHANNEL: stable
  WORKING_DIR: ./

jobs:
  # ──────────────────────────────────────────────
  # 1. Static Analysis
  # ──────────────────────────────────────────────
  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ env.FLUTTER_CHANNEL }}

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.WORKING_DIR }}/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('my_expenses/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Write .env
        run: echo "API_URL=${{ secrets.API_URL }}" > .env

      - name: Install dependencies
        run: flutter pub get

      - name: Run flutter analyze
        run: flutter analyze --fatal-infos --fatal-warnings

  # ──────────────────────────────────────────────
  # 2. Testing
  # ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ env.FLUTTER_CHANNEL }}

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.WORKING_DIR }}/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('my_expenses/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Write .env
        run: echo "API_URL=${{ secrets.API_URL }}" > .env

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Check coverage threshold
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "⚠️  No coverage file found – skipping threshold check."
            exit 0
          fi
          TOTAL=$(grep -c "^DA:" coverage/lcov.info || true)
          HIT=$(grep "^DA:" coverage/lcov.info | grep -cv ",0$" || true)
          if [ "$TOTAL" -eq 0 ]; then
            echo "No coverage data lines found."
            exit 0
          fi
          PCT=$(( HIT * 100 / TOTAL ))
          echo "Coverage: ${PCT}% (${HIT}/${TOTAL} lines hit)"
          if [ "$PCT" -lt 40 ]; then
            echo "::error::Coverage ${PCT}% is below the 40% threshold."
            exit 1
          fi

  # ──────────────────────────────────────────────
  # 3. Build Release APK
  # ──────────────────────────────────────────────
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ env.FLUTTER_CHANNEL }}

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.WORKING_DIR }}/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('my_expenses/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('my_expenses/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Write .env
        run: echo "API_URL=${{ secrets.API_URL }}" > .env

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-expenses-apk-${{ github.sha }}
          path: my_expenses/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols-${{ github.sha }}
          path: my_expenses/build/debug-info/
          retention-days: 14

